---
- name: Kubernetes control plane initialization and configuration
  hosts: kcontr
  become: yes
  tasks:
    - name: Initialize control plane
      ansible.builtin.shell:
        cmd: |
          kubeadm init \
          --apiserver-advertise-address=192.168.20.30 \
          --control-plane-endpoint=192.168.20.30 \
          --pod-network-cidr=192.168.0.0/16 \
          --upload-certs
    - name: Copy kubeconfig to user directory
      ansible.builtin.shell:
        cmd: |
          mkdir -p /home/lain/.kube
          cp -i /etc/kubernetes/admin.conf /home/lain/.kube/config
          chown 1000:1000 /home/lain/.kube/config

- name: Configure Calico networking
  hosts: kcontr
  vars:
    calico_version: "v3.31.4"
  tasks:
    - name: Download Calico
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/tigera-operator.yaml
        dest: /tmp/tigera-operator.yaml
    - name: Download Calico resource definitions
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/custom-resources.yaml
        dest: /tmp/custom-resources.yaml

    - name: Install Calico operator
      ansible.builtin.shell:
        cmd: kubectl create -f /tmp/tigera-operator.yaml

    - name: Wait for operator to spin up
      ansible.builtin.pause:
        seconds: 30

    - name: Install Calico custom-resources
      ansible.builtin.shell:
        cmd: kubectl create -f /tmp/custom-resources.yaml
